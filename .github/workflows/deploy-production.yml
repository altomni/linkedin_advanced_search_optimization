name: Deploy to HQO (production)

# push 到 production 分支 → 构建 amd64 镜像 → 推 Docker Hub → 滚动更新 HQO lnkd-adv-project/linkedin-aso
on:
  push:
    branches: [production]
  workflow_dispatch: {}

concurrency:
  group: deploy-linkedin-aso-production
  cancel-in-progress: false

env:
  IMAGE: minghealtomni/linkedin-aso
  NAMESPACE: lnkd-adv-project
  DEPLOYMENT: linkedin-aso
  CONTAINER: linkedin-aso

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      # amd64 only — the deployment pins kubernetes.io/arch=amd64 (pandas/numpy
      # under QEMU arm64 would slow the build for nothing).
      - name: Build & push (linux/amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5

      # 经 Rancher 代理(hqo.hitalentech.com:32010)连集群,凭证是 lnkd-adv-project ns 的
      # gha-deployer SA token —— 只能 patch 本 ns 的 deployment,读不到任何 secret。
      - name: Write kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      # ⚠️ set image 只换镜像,不碰 live 的 env/resources。
      # 副作用:deploy/k8s/linkedin-aso/20-deployment.yaml 的 tag 会落后于线上。
      # 手动 apply 那份清单之前,务必先 kubectl diff,否则会把镜像回滚。
      - name: Rollout new image
        run: |
          set -euo pipefail
          kubectl -n "$NAMESPACE" set image "deployment/$DEPLOYMENT" \
            "$CONTAINER=$IMAGE:${{ github.sha }}"
          kubectl -n "$NAMESPACE" rollout status "deployment/$DEPLOYMENT" --timeout=300s

      # 单副本 + Recreate:滚动期间会短暂不可用,这里确认恢复
      - name: Verify rollout
        run: |
          set -euo pipefail
          kubectl -n "$NAMESPACE" get deploy "$DEPLOYMENT" \
            -o jsonpath='{.spec.template.spec.containers[0].image}{"\n"}'
          kubectl -n "$NAMESPACE" get pod -l app="$DEPLOYMENT"
